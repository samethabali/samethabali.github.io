<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Birim Dönüştürücü | Samet Can Habalı</title>
    <style>
        /* Standart Site Stilleri (Üstteki dosyayla aynı kalıp) */
        h1, h2, h3, p, a, li, label { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        body { background-color: #e9ecef; padding: 30px; margin: 0; }
        .container { width: 960px; margin: 0 auto; background-color: #ffffff; border: 2px solid #dee2e6; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        header { background-color: #2b3035; color: #ffffff; padding: 25px; border-bottom: 4px solid #0dcaf0; border-top-left-radius: 6px; border-top-right-radius: 6px; }
        header h1 { display: inline-block; font-size: 26px; color: #ffffff; width: 30%; vertical-align: middle; white-space: nowrap; }
        header nav { display: inline-block; width: 68%; text-align: right; vertical-align: middle; white-space: nowrap; }
        header nav ul { list-style: none; margin: 0; padding: 0; }
        header nav ul li { display: inline-block; margin-left: 10px; }
        header nav ul li a { text-decoration: none; color: #e9ecef; padding: 10px 15px; border-radius: 5px; transition: all 0.3s ease; font-weight: bold; }
        header nav ul li a:hover { background-color: #0dcaf0; color: #2b3035; }
        
        header nav ul li.dropdown { position: relative; display: inline-block; }
        header nav ul li.dropdown .dropdown-content { display: none; position: absolute; background-color: #2b3035; min-width: 180px; box-shadow: 0px 8px 16px rgba(0,0,0,0.3); z-index: 1000; top: 100%; left: 0; border-radius: 5px; overflow: hidden; }
        header nav ul li.dropdown:hover .dropdown-content { display: block; }
        header nav ul li.dropdown .dropdown-content a { display: block; padding: 12px 16px; text-align: left; border-radius: 0; margin: 0; }
        header nav ul li.dropdown .dropdown-content a:hover { background-color: #0dcaf0; color: #2b3035; }

        main { padding: 25px; }
        .content-box, .sidebar-box { display: inline-block; vertical-align: top; padding: 20px; box-sizing: border-box; border-radius: 6px; min-height: 380px; }
        .content-box { width: 60%; background-color: #f8f9fa; border: 1px solid #ced4da; margin-right: 3%; }
        .sidebar-box { width: 36%; background-color: #e0fbfc; border: 1px solid #90e0ef; }
        .content-box h2, .sidebar-box h2 { font-size: 20px; color: #212529; border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 10px; margin-bottom: 15px; }
        main p { font-size: 15px; color: #495057; line-height: 1.8; text-align: justify; margin-bottom: 12px; }

        /* JS Form Stilleri */
        .app-form label { display: block; margin-bottom: 8px; font-weight: bold; color: #495057; font-size: 14px; }
        .app-form input, .app-form select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 15px; background-color: #fff; }
        .btn-submit { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background-color: #0056b3; }
        
        .result-box { display: none; margin-top: 25px; padding: 20px; background-color: #d1ecf1; border: 1px solid #bee5eb; border-radius: 4px; text-align: center; color: #0c5460; font-size: 18px; font-weight: bold; }

        footer { text-align: center; padding: 20px; background-color: #2b3035; color: #adb5bd; border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SCH. Apps</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Ana Sayfa</a></li>
                    <li><a href="about.html">Hakkımda</a></li>
                    <li><a href="interests.html">İlgi Alanlarım</a></li>
                    <li><a href="contact.html">İletişim</a></li>
                    <li class="dropdown">
                        <a href="javascript:void(0)" style="cursor: pointer; color: #0dcaf0;">Laboratuvarlar ▾</a>
                        <div class="dropdown-content">
                            <a href="flexbox.html">📌 CSS: Flexbox</a>
                            <a href="lab-position.html">📌 CSS: Position</a>
                            <a href="not-hesaplama.html">⚡ JS: Not Hesaplama</a>
                            <a href="birim-donusturucu.html">⚡ JS: Birim Dön.</a>
                            <a href="hafta7.html">🚀 B&JS: Etkinlik Kayıt</a>
                        </div>
                    </li>
                </ul>
            </nav>
        </header>
        <main>
            <div class="content-box">
                <h2>Mühendislik Birim Dönüştürücüsü</h2>
                <div class="app-form">
                    <label for="deger">Dönüştürülecek Değeri Giriniz:</label>
                    <input type="number" id="deger" placeholder="Örn: 50">

                    <label for="tip">Dönüşüm Tipi Seçiniz:</label>
                    <select id="tip">
                        <option value="c_to_f">Sıcaklık: Celsius -> Fahrenheit</option>
                        <option value="m_to_km">Uzunluk: Metre -> Kilometre</option>
                        <option value="kg_to_g">Ağırlık: Kilogram -> Gram</option>
                    </select>

                    <button type="button" class="btn-submit" onclick="donustur()">Hesapla ve Dönüştür</button>
                </div>

                <div id="sonucAlani" class="result-box">
                    Sonuç: <span id="sonucDeger">-</span>
                </div>
            </div>
        </main>
        <footer>
            <p>© 2026 Samet Can Habalı. Web Programlama JavaScript Laboratuvarı.</p>
        </footer>
    </div>

    <script>
        function donustur() {
            const deger = parseFloat(document.getElementById("deger").value);
            const tip = document.getElementById("tip").value;

            if(isNaN(deger)) {
                alert("Lütfen hesaplama için sayısal bir değer giriniz.");
                return;
            }

            let sonuc = 0;

            switch(tip) {
                case "c_to_f":
                    sonuc = (deger * 9/5) + 32;
                    break;
                case "m_to_km":
                    sonuc = deger / 1000;
                    break;
                case "kg_to_g":
                    sonuc = deger * 1000;
                    break;
            }

            // JavaScript formatlama ile sayıları şık bir şekilde yazdırır
            document.getElementById("sonucDeger").innerText = sonuc.toLocaleString('tr-TR');
            document.getElementById("sonucAlani").style.display = "block";
        }
    </script>
</body>
</html>
